<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Gestor de WhatsApp</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; }
    #toolbar { padding:10px; background:#eee; }
    #contenedor { display:flex; flex-wrap:wrap; justify-content:center; }
    webview { width:45%; height:600px; margin:10px; border:1px solid #ccc; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button onclick="crearInstancia()">Nueva instancia</button>
  </div>
  <div id="contenedor"></div>

  <script>
    function crearInstancia() {
      const cont = document.getElementById('contenedor');
      const webview = document.createElement('webview');
      webview.src = 'https://web.whatsapp.com';
      cont.appendChild(webview);
    }
  </script>
</body>
</html>
