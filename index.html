
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tailwind base styles might be included by the CDN, but good to have some resets */
        body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; }

        /* Print styles */
        @media print {
            body * {
                visibility: hidden;
            }
            #reportModal, #reportModal * {
                visibility: visible;
            }
            #reportModal {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                border: none;
                box-shadow: none;
                overflow: visible !important;
            }
            #reportModal .modal-content {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: 100% !important;
                height: auto !important;
                background-color: white !important;
                color: black !important;
            }
            #reportModal h2, #reportModal h3, #reportModal p, #reportModal th, #reportModal td {
                color: black !important;
            }
            #reportModal table, #reportModal th, #reportModal td {
                border-color: #ccc !important;
            }
            #reportModal .bg-gray-700, #reportModal .bg-gray-800, #reportModal .bg-gray-900 {
                 background-color: white !important;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
<script type="importmap">
